<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR Con Bo Sua - Tu Xoay Bang Tay</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;" gesture-detector>
      
      <a-assets>
        <a-asset-item id="cow-obj" src="13085_Holsteind_v2_l3.obj"></a-asset-item>
        <a-asset-item id="cow-mtl" src="13085_Holsteind_v2_l3.mtl"></a-asset-item>
      </a-assets>
      
      <a-marker preset="hiro" raycaster="objects: .clickable" emitevents="true" cursor="fuse: false; rayOrigin: mouse;">
        <a-obj-model 
          src="#cow-obj" 
          mtl="#cow-mtl" 
          position="0 0 0" 
          scale="0.05 0.05 0.05" 
          rotation="-90 90 0"
          class="clickable"
          gesture-handler="minScale: 0.02; maxScale: 0.1">
        </a-obj-model>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
